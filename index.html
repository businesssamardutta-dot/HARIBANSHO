<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HARIBANSHA | Gradient Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- React 18 -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <!-- Babel Standalone -->
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <style>
        * { transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .inline-panel { animation: slideDown 0.25s ease-out; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <!-- 1. THE JSX CONTENT (Hidden in a template) -->
    <script type="text/plain" id="jsx-content">
        const { useState, useEffect } = React;

        const themes = [
            { id: 0, name: 'Lime Glow', start: '#6DE195', end: '#C4E759', isDark: false },
            { id: 1, name: 'Minty', start: '#41C7AF', end: '#54E38E', isDark: false },
            { id: 2, name: 'Spring', start: '#99E5A2', end: '#D4FC78', isDark: false },
            { id: 3, name: 'Sky Blue', start: '#ABC7FF', end: '#C1E3FF', isDark: false },
            { id: 4, name: 'Azure', start: '#6CACFF', end: '#8DEBFF', isDark: false },
            { id: 5, name: 'Oceanic', start: '#5583EE', end: '#41D8DD', isDark: false },
            { id: 6, name: 'Lavender', start: '#A16BFE', end: '#DEB0DF', isDark: false },
            { id: 7, name: 'Sunset', start: '#D279EE', end: '#F8C390', isDark: false },
            { id: 8, name: 'Peach', start: '#F78FAD', end: '#FDEB82', isDark: false },
            { id: 9, name: 'Crimson', start: '#BC3D2F', end: '#A16BFE', isDark: false },
            { id: 10, name: 'Royal', start: '#A43AB2', end: '#E13680', isDark: false },
            { id: 11, name: 'Berry', start: '#9D2E7D', end: '#E16E93', isDark: false },
            { id: 12, name: 'Blossom', start: '#F5CCF6', end: '#F1EEF9', isDark: false },
            { id: 13, name: 'Cloud', start: '#F0EFF0', end: '#FAF8F9', isDark: false },
            { id: 14, name: 'Midnight', start: '#121317', end: '#323B42', isDark: true }
        ];

        const Card = ({ icon, title, theme, children }) => (
            <div className="rounded-2xl border shadow-sm hover:shadow-xl transition-all duration-300 overflow-hidden bg-white" 
                 style={{ borderColor: theme.isDark ? '#333' : '#e2e8f0' }}>
                <div className="p-5">
                    <div className="flex items-center gap-3 mb-3">
                        <div className="w-10 h-10 rounded-xl flex items-center justify-center text-white shadow-md" 
                             style={{ background: `linear-gradient(135deg, ${theme.start}, ${theme.end})` }}>
                            <i className={icon + " text-xl"}></i>
                        </div>
                        <h2 className="text-xl font-bold" style={{ color: theme.isDark ? '#fff' : '#0f172a' }}>{title}</h2>
                    </div>
                    {children}
                </div>
            </div>
        );

        const App = () => {
            const [currentTheme, setCurrentTheme] = useState(() => {
                const saved = localStorage.getItem('haribanshoTheme');
                return saved ? JSON.parse(saved) : themes[0];
            });
            const [dropdownOpen, setDropdownOpen] = useState(false);
            const [liveData, setLiveData] = useState({ employees: 52, completion: 87.5, time: new Date().toLocaleTimeString() });

            useEffect(() => {
                document.body.style.backgroundColor = currentTheme.isDark ? '#121317' : '#f8fafc';
                localStorage.setItem('haribanshoTheme', JSON.stringify(currentTheme));
            }, [currentTheme]);

            useEffect(() => {
                const interval = setInterval(() => {
                    setLiveData(prev => ({
                        ...prev,
                        employees: 48 + Math.floor(Math.random() * 18),
                        time: new Date().toLocaleTimeString()
                    }));
                }, 5000);
                return () => clearInterval(interval);
            }, []);

            const btnStyle = {
                background: `linear-gradient(135deg, ${currentTheme.start}, ${currentTheme.end})`,
                color: '#ffffff'
            };

            return React.createElement('div', { className: "max-w-[1440px] mx-auto px-4 py-8" },
                // Header
                React.createElement('div', { className: "flex flex-col sm:flex-row justify-between items-center gap-4 mb-10" },
                    React.createElement('div', null,
                        React.createElement('h1', { className: "text-4xl font-extrabold bg-gradient-to-r from-blue-500 to-purple-600 bg-clip-text text-transparent" },
                            React.createElement('i', { className: "bi bi-lightning-charge-fill text-yellow-400 mr-2" }),
                            "HARIBANSHA"
                        ),
                        React.createElement('p', { className: "text-sm font-medium", style: { color: currentTheme.isDark ? '#94a3b8' : '#64748b' } },
                            `Intelligence Dashboard • ${currentTheme.name}`
                        )
                    ),
                    // Theme Selector
                    React.createElement('div', { className: "relative" },
                        React.createElement('button', {
                            onClick: () => setDropdownOpen(!dropdownOpen),
                            className: "flex items-center gap-2 px-6 py-2.5 rounded-full border shadow-sm font-bold text-sm transition-all",
                            style: { 
                                background: currentTheme.isDark ? '#333' : '#fff', 
                                borderColor: currentTheme.isDark ? '#444' : '#e2e8f0',
                                color: currentTheme.isDark ? '#fff' : '#0f172a'
                            }
                        },
                            React.createElement('div', { className: "w-4 h-4 rounded-full", style: { background: `linear-gradient(135deg, ${currentTheme.start}, ${currentTheme.end})` } }),
                            currentTheme.name,
                            React.createElement('i', { className: `bi bi-chevron-down transition-transform ${dropdownOpen ? 'rotate-180' : ''}` })
                        ),
                        dropdownOpen && React.createElement('div', {
                            className: "absolute right-0 mt-3 w-80 rounded-2xl shadow-2xl border overflow-hidden z-50 inline-panel",
                            style: { backgroundColor: currentTheme.isDark ? '#1e293b' : '#fff', borderColor: currentTheme.isDark ? '#334155' : '#e2e8f0' }
                        },
                            React.createElement('div', { className: "p-3 grid grid-cols-3 gap-2 max-h-96 overflow-y-auto" },
                                themes.map(t => React.createElement('button', {
                                    key: t.id,
                                    onClick: () => { setCurrentTheme(t); setDropdownOpen(false); },
                                    className: "flex flex-col items-center gap-1 p-2 rounded-xl hover:scale-105 transition-transform",
                                    style: { background: `linear-gradient(135deg, ${t.start}, ${t.end})` }
                                }, React.createElement('span', { className: "text-[10px] font-bold text-white" }, t.name.split(' ')[0])))
                            )
                        )
                    )
                ),
                // Grid
                React.createElement('div', { className: "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" },
                    // Card 1: Task Delegation
                    Card({ icon: "bi bi-check2-square", title: "Task Delegation", theme: currentTheme },
                        React.createElement('p', { className: "text-sm mb-4", style: { color: currentTheme.isDark ? '#94a3b8' : '#64748b' } }, "Workflows & Tracking."),
                        React.createElement('div', { className: "flex gap-2" },
                            React.createElement('a', { href: "https://docs.google.com/forms/d/e/1FAIpQLSf4hFkMP31RLK2GLikE9LpctnIwhd-DKQLJAXJchdIQ733gwQ/viewform", target: "_blank", className: "px-4 py-2 rounded-full text-xs font-bold text-white shadow-lg", style: btnStyle }, "Form"),
                            React.createElement('a', { href: "https://lookerstudio.google.com/reporting/c5bf7946-59a1-4896-be77-ec76dbd83447/page/qlD", target: "_blank", className: "px-4 py-2 rounded-full text-xs font-bold text-white shadow-lg", style: btnStyle }, "Done List")
                        )
                    ),
                    // Card 2: Check List
                    Card({ icon: "bi bi-clipboard-check", title: "Check List", theme: currentTheme },
                        React.createElement('p', { className: "text-sm mb-4", style: { color: currentTheme.isDark ? '#94a3b8' : '#64748b' } }, "Real-time sync management."),
                        React.createElement('a', { href: "https://checklist-nu-blue.vercel.app/", target: "_blank", className: "inline-flex items-center gap-2 px-6 py-2.5 rounded-full text-sm font-bold text-white shadow-lg", style: btnStyle }, React.createElement('i', { className: "bi bi-box-arrow-up-right" }), " Launch App")
                    ),
                    // Card 3: Attendance Master
                    Card({ icon: "bi bi-person-badge", title: "Attendance Master", theme: currentTheme },
                        React.createElement('p', { className: "text-sm mb-4", style: { color: currentTheme.isDark ? '#94a3b8' : '#64748b' } }, "Employee & MIS Portal."),
                        React.createElement('a', { href: "https://businesssamardutta-dot.github.io/Attendence/", target: "_blank", className: "inline-flex items-center gap-2 px-6 py-2.5 rounded-full text-sm font-bold text-white shadow-lg", style: btnStyle }, React.createElement('i', { className: "bi bi-box-arrow-up-right" }), " Launch App")
                    ),
                    // UPDATED Card 4: Credit Flow (RENAMED AND LINK UPDATED)
                    Card({ icon: "bi bi-arrow-repeat", title: "Credit Flow", theme: currentTheme },
                        React.createElement('p', { className: "text-sm mb-4", style: { color: currentTheme.isDark ? '#94a3b8' : '#64748b' } }, "Real-time credit management flow."),
                        React.createElement('a', { href: "https://businesssamardutta-dot.github.io/Credit-Flow/", target: "_blank", className: "inline-flex items-center gap-2 px-6 py-2.5 rounded-full text-sm font-bold text-white shadow-lg", style: btnStyle }, React.createElement('i', { className: "bi bi-box-arrow-up-right" }), " Launch App")
                    ),
                    // Card 5: Live Hub
                    Card({ icon: "bi bi-bar-chart-steps", title: "Live Hub", theme: currentTheme },
                        React.createElement('div', { className: "text-xs p-4 rounded-xl space-y-2", style: { backgroundColor: currentTheme.isDark ? '#334155' : '#f1f5f9', color: currentTheme.isDark ? '#cbd5e1' : '#475569' } },
                            React.createElement('div', { className: "flex justify-between" }, React.createElement('span', null, "👥 Staff:"), React.createElement('span', { className: "font-bold", style: { color: currentTheme.isDark ? '#fff' : '#000' } }, liveData.employees)),
                            React.createElement('div', { className: "flex justify-between" }, React.createElement('span', null, "✅ Done:"), React.createElement('span', { className: "font-bold", style: { color: currentTheme.isDark ? '#fff' : '#000' } }, liveData.completion + "%")),
                            React.createElement('div', { className: "flex justify-between" }, React.createElement('span', null, "🕒 Time:"), React.createElement('span', { className: "font-bold", style: { color: currentTheme.isDark ? '#fff' : '#000' } }, liveData.time))
                        )
                    )
                )
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>

    <!-- 2. THE ENGINE: Runs code with 'Classic' transform for GitHub stability -->
    <script>
        (function() {
            try {
                let code = document.getElementById('jsx-content').innerHTML;
                let transformed = Babel.transform(code, {
                    presets: [['react', { runtime: 'classic' }]]
                }).code;

                transformed = transformed.replace(/import\s+.*\s+from\s+['"].*['"];?/g, '')
                                         .replace(/export\s+default\s+/g, '')
                                         .replace(/export\s+/g, '');

                const runCode = new Function('React', 'ReactDOM', transformed);
                runCode(window.React, window.ReactDOM);
            } catch (err) {
                console.error("Dashboard Error:", err);
                document.getElementById('root').innerHTML = `<div class="p-10 text-red-500 text-center">System Error: ${err.message}</div>`;
            }
        })();
    </script>
</body>
</html>
