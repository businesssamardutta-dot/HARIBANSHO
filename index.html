<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HARIBANSHA | React Dashboard</title>
    <!-- Tailwind CSS v4 + Bootstrap Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- React 18 + ReactDOM -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Inline panel animation */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .inline-panel {
            animation: slideDown 0.25s ease-out;
        }
    </style>
</head>
<body class="bg-slate-50" id="root"></body>

<script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ==================== 13 LOKERTIVE THEMES ====================
    const themes = [
        { id: 0, name: 'Violet Dream', accent: '#8b5cf6', accentLight: '#f3e8ff', textPrimary: '#0f172a', textSecondary: '#475569', border: '#e2e8f0', cardBg: '#ffffff', bodyBg: '#f8fafc' },
        { id: 1, name: 'Emerald Glow', accent: '#10b981', accentLight: '#d1fae5', textPrimary: '#064e3b', textSecondary: '#047857', border: '#a7f3d0', cardBg: '#ffffff', bodyBg: '#ecfdf5' },
        { id: 2, name: 'Rose Quartz', accent: '#f43f5e', accentLight: '#ffe4e6', textPrimary: '#881337', textSecondary: '#e11d48', border: '#fecdd3', cardBg: '#ffffff', bodyBg: '#fff1f2' },
        { id: 3, name: 'Ocean Breeze', accent: '#0ea5e9', accentLight: '#e0f2fe', textPrimary: '#0c4a6e', textSecondary: '#0284c7', border: '#bae6fd', cardBg: '#ffffff', bodyBg: '#f0f9ff' },
        { id: 4, name: 'Amber Sunset', accent: '#f59e0b', accentLight: '#fef3c7', textPrimary: '#78350f', textSecondary: '#d97706', border: '#fde68a', cardBg: '#ffffff', bodyBg: '#fffbeb' },
        { id: 5, name: 'Teal Mystic', accent: '#14b8a6', accentLight: '#ccfbf1', textPrimary: '#134e4a', textSecondary: '#0d9488', border: '#99f6e4', cardBg: '#ffffff', bodyBg: '#f0fdfa' },
        { id: 6, name: 'Indigo Nights', accent: '#6366f1', accentLight: '#e0e7ff', textPrimary: '#1e1b4b', textSecondary: '#4338ca', border: '#c7d2fe', cardBg: '#ffffff', bodyBg: '#eef2ff' },
        { id: 7, name: 'Coral Haven', accent: '#f97316', accentLight: '#ffedd5', textPrimary: '#7f2d1b', textSecondary: '#ea580c', border: '#fed7aa', cardBg: '#ffffff', bodyBg: '#fff5f0' },
        { id: 8, name: 'Lime Frost', accent: '#84cc16', accentLight: '#ecfccb', textPrimary: '#365314', textSecondary: '#65a30d', border: '#d9f99d', cardBg: '#ffffff', bodyBg: '#f7fee7' },
        { id: 9, name: 'Royal Purple', accent: '#a855f7', accentLight: '#f3e8ff', textPrimary: '#3b0764', textSecondary: '#9333ea', border: '#e9d5ff', cardBg: '#ffffff', bodyBg: '#faf5ff' },
        { id: 10, name: 'Peach Bloom', accent: '#ef4444', accentLight: '#fee2e2', textPrimary: '#7f1d1d', textSecondary: '#dc2626', border: '#fecaca', cardBg: '#ffffff', bodyBg: '#fef2f2' },
        { id: 11, name: 'Mint Leaf', accent: '#22c55e', accentLight: '#dcfce7', textPrimary: '#14532d', textSecondary: '#16a34a', border: '#bbf7d0', cardBg: '#ffffff', bodyBg: '#f0fdf4' },
        { id: 12, name: 'Electric Cyan', accent: '#06b6d4', accentLight: '#cffafe', textPrimary: '#164e63', textSecondary: '#0891b2', border: '#a5f3fc', cardBg: '#ffffff', bodyBg: '#ecfeff' }
    ];

    // Reminder System
    let reminderList = [];

    // Main App Component
    const App = () => {
        // Theme state
        const [currentTheme, setCurrentTheme] = useState(() => {
            const saved = localStorage.getItem('haribanshoReactTheme');
            return saved ? JSON.parse(saved) : themes[0];
        });
        const [dropdownOpen, setDropdownOpen] = useState(false);
        
        // Inline Panel State (for Google Scripts - opens in same window)
        const [activePanel, setActivePanel] = useState(null); // { url, title }
        
        // Reminder state
        const [reminders, setReminders] = useState([]);
        const [reminderMessage, setReminderMessage] = useState('');
        
        // IQ Response state
        const [iqResponse, setIqResponse] = useState('🤖 Ready to analyze operations');
        
        // Live Data state
        const [liveData, setLiveData] = useState({ employees: 52, tasks: 28, completion: 87.5, time: new Date().toLocaleTimeString() });
        
        // Apply theme to body
        useEffect(() => {
            document.body.style.backgroundColor = currentTheme.bodyBg;
            document.documentElement.style.setProperty('--theme-accent', currentTheme.accent);
            document.documentElement.style.setProperty('--theme-accent-light', currentTheme.accentLight);
            localStorage.setItem('haribanshoReactTheme', JSON.stringify(currentTheme));
        }, [currentTheme]);
        
        // Load reminders from localStorage
        useEffect(() => {
            const saved = localStorage.getItem('haribanshoReminders');
            if (saved) setReminders(JSON.parse(saved));
        }, []);
        
        // Save reminders
        useEffect(() => {
            localStorage.setItem('haribanshoReminders', JSON.stringify(reminders));
        }, [reminders]);
        
        // Live data interval
        useEffect(() => {
            const interval = setInterval(() => {
                setLiveData({
                    employees: 48 + Math.floor(Math.random() * 18),
                    tasks: 22 + Math.floor(Math.random() * 15),
                    completion: (72 + Math.random() * 24).toFixed(1),
                    time: new Date().toLocaleTimeString()
                });
            }, 35000);
            return () => clearInterval(interval);
        }, []);
        
        // Theme handlers
        const selectTheme = (theme) => {
            setCurrentTheme(theme);
            setDropdownOpen(false);
        };
        
        // Reminder handlers
        const setReminder = () => {
            const text = prompt("Set a disturbance reminder:");
            if (text?.trim()) {
                const newReminder = { id: Date.now(), text: text.trim(), time: new Date().toLocaleString() };
                const updated = [...reminders, newReminder];
                setReminders(updated);
                setReminderMessage(`✅ Reminder added: "${text}" at ${new Date().toLocaleTimeString()}`);
                setTimeout(() => setReminderMessage(''), 3000);
            }
        };
        
        const viewReminders = () => {
            if (reminders.length === 0) {
                setReminderMessage("📭 No active reminders.");
                setTimeout(() => setReminderMessage(''), 2000);
            } else {
                alert(reminders.map(r => `🔹 ${r.text} (${r.time})`).join('\n'));
            }
        };
        
        // IQ Handlers
        const healthScan = () => {
            setIqResponse('<i class="bi bi-arrow-repeat animate-spin mr-1"></i> Scanning...');
            setTimeout(() => setIqResponse('✅ Health Index: 94% | Task Flow: Optimal | Attendance: 89%'), 700);
        };
        
        const productivityPulse = () => {
            setIqResponse('⚡ Productivity Pulse: Peak 9–11 AM | +22% efficiency recommended');
        };
        
        // Open inline panel (same window, no fullscreen)
        const openInlinePanel = (url, title) => {
            setActivePanel({ url: url + (url.includes('?') ? '&' : '?') + '_cb=' + Date.now(), title });
        };
        
        const closeInlinePanel = () => {
            setActivePanel(null);
        };
        
        // Refresh live data
        const refreshLiveData = () => {
            setLiveData({
                employees: 48 + Math.floor(Math.random() * 18),
                tasks: 22 + Math.floor(Math.random() * 15),
                completion: (72 + Math.random() * 24).toFixed(1),
                time: new Date().toLocaleTimeString()
            });
        };
        
        // Card component
        const Card = ({ icon, title, children }) => (
            <div className="rounded-2xl border shadow-sm hover:shadow-lg transition-all duration-300 overflow-hidden" 
                 style={{ backgroundColor: currentTheme.cardBg, borderColor: currentTheme.border }}>
                <div className="p-5">
                    <div className="flex items-center gap-3 mb-3">
                        <div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{ backgroundColor: currentTheme.accentLight }}>
                            <i className={`${icon} text-xl`} style={{ color: currentTheme.accent }}></i>
                        </div>
                        <h2 className="text-xl font-bold" style={{ color: currentTheme.textPrimary }}>{title}</h2>
                    </div>
                    {children}
                </div>
            </div>
        );
        
        return (
            <div className="max-w-[1440px] mx-auto px-4 sm:px-6 py-6 sm:py-8">
                {/* Header */}
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
                    <div>
                        <h1 className="text-3xl sm:text-4xl font-extrabold bg-gradient-to-r from-purple-600 to-pink-500 bg-clip-text text-transparent">
                            <i className="bi bi-charging-station-fill text-purple-500 mr-2"></i>
                            HARIBANSHO
                        </h1>
                        <p className="text-sm mt-1 font-medium" style={{ color: currentTheme.textSecondary }}>Real-time Intelligence Dashboard</p>
                    </div>
                    
                    {/* Theme Dropdown */}
                    <div className="relative">
                        <button 
                            onClick={() => setDropdownOpen(!dropdownOpen)}
                            className="flex items-center gap-2 px-5 py-2.5 rounded-full bg-white border shadow-sm hover:shadow-md transition-all duration-200 text-slate-700 font-medium text-sm"
                            style={{ backgroundColor: currentTheme.cardBg, borderColor: currentTheme.border, color: currentTheme.textPrimary }}
                        >
                            <i className="bi bi-palette-fill" style={{ color: currentTheme.accent }}></i>
                            <span>{currentTheme.name}</span>
                            <i className={`bi bi-chevron-down text-xs transition-transform duration-200 ${dropdownOpen ? 'rotate-180' : ''}`}></i>
                        </button>
                        
                        {dropdownOpen && (
                            <div className="absolute right-0 mt-2 w-72 rounded-2xl shadow-xl border overflow-hidden z-50 animate-fade-in" 
                                 style={{ backgroundColor: currentTheme.cardBg, borderColor: currentTheme.border }}>
                                <div className="p-3 border-b" style={{ borderColor: currentTheme.border, backgroundColor: currentTheme.accentLight }}>
                                    <p className="text-xs font-semibold uppercase tracking-wide" style={{ color: currentTheme.textSecondary }}>Choose your vibe</p>
                                </div>
                                <div className="p-3 grid grid-cols-4 gap-2 max-h-80 overflow-y-auto">
                                    {themes.map(theme => (
                                        <button
                                            key={theme.id}
                                            onClick={() => selectTheme(theme)}
                                            className="flex flex-col items-center gap-1 p-2 rounded-xl transition-all hover:scale-105"
                                            style={{ backgroundColor: theme.accentLight }}
                                        >
                                            <div className="w-6 h-6 rounded-full" style={{ backgroundColor: theme.accent }}></div>
                                            <span className="text-[10px] font-medium" style={{ color: theme.textPrimary }}>{theme.name.split(' ')[0]}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
                
                {/* Inline Panel (Same Window, No Fullscreen) */}
                {activePanel && (
                    <div className="mb-6 rounded-2xl border shadow-lg overflow-hidden inline-panel" style={{ backgroundColor: currentTheme.cardBg, borderColor: currentTheme.border }}>
                        <div className="flex justify-between items-center p-4 border-b" style={{ borderColor: currentTheme.border }}>
                            <h3 className="font-semibold" style={{ color: currentTheme.textPrimary }}>
                                <i className="bi bi-window-sidebar mr-2" style={{ color: currentTheme.accent }}></i>
                                {activePanel.title}
                            </h3>
                            <button onClick={closeInlinePanel} className="text-slate-400 hover:text-slate-600 text-2xl leading-none">&times;</button>
                        </div>
                        <iframe 
                            src={activePanel.url} 
                            className="w-full h-[500px] border-0"
                            title={activePanel.title}
                            sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-popups-to-escape-sandbox"
                        />
                    </div>
                )}
                
                {/* 6 Cards Grid */}
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    
                    {/* Card 1: Task Deligation */}
                    <Card icon="bi bi-check2-square" title="Task Deligation">
                        <p className="text-sm mb-4" style={{ color: currentTheme.textSecondary }}>Smart delegation, track progress & insights</p>
                        <div className="flex flex-wrap gap-2">
                            <a href="https://docs.google.com/forms/d/e/1FAIpQLSf4hFkMP31RLK2GLikE9LpctnIwhd-DKQLJAXJchdIQ733gwQ/viewform" target="_blank" rel="noopener noreferrer" 
                               className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-semibold transition-all hover:scale-95"
                               style={{ backgroundColor: currentTheme.accentLight, color: currentTheme.accent }}>
                                <i className="bi bi-file-text"></i> Form
                            </a>
                            <a href="https://lookerstudio.google.com/reporting/c5bf7946-59a1-4896-be77-ec76dbd83447/page/qlD" target="_blank" rel="noopener noreferrer"
                               className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-semibold transition-all hover:scale-95"
                               style={{ backgroundColor: currentTheme.accentLight, color: currentTheme.accent }}>
                                <i className="bi bi-check-circle"></i> Done List
                            </a>
                            <a href="https://lookerstudio.google.com/reporting/0c82f513-49ae-409f-a29c-39e7ea615dd7/page/qlD" target="_blank" rel="noopener noreferrer"
                               className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-semibold transition-all hover:scale-95"
                               style={{ backgroundColor: currentTheme.accentLight, color: currentTheme.accent }}>
                                <i className="bi bi-table"></i> Task Sheet
                            </a>
                        </div>
                    </Card>
                    
                    {/* Card 2: Check List */}
                    <Card icon="bi bi-clipboard-check" title="Check List">
                        <p className="text-sm mb-4" style={{ color: currentTheme.textSecondary }}>Powerful checklist management</p>
                        <a href="https://checklist-nu-blue.vercel.app/" target="_blank" rel="noopener noreferrer" 
                           className="inline-flex items-center gap-2 px-4 py-2 rounded-full text-sm font-semibold transition-all hover:scale-95"
                           style={{ backgroundColor: currentTheme.accent, color: 'white' }}>
                            <i className="bi bi-box-arrow-up-right"></i> Launch App
                        </a>
                        <p className="text-xs mt-3" style={{ color: currentTheme.textSecondary }}><i className="bi bi-sync-alt"></i> Real-time sync • GitHub power</p>
                    </Card>
                    
                    {/* Card 3: Distubation Reminder */}
                    <Card icon="bi bi-bell-fill" title="Distubation reminder">
                        <div className="flex flex-wrap gap-2 mb-3">
                            <button onClick={setReminder} 
                                className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-semibold transition-all hover:scale-95"
                                style={{ backgroundColor: currentTheme.accentLight, color: currentTheme.accent }}>
                                <i className="bi bi-clock"></i> Set Reminder
                            </button>
                            <button onClick={viewReminders}
                                className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-semibold transition-all hover:scale-95"
                                style={{ backgroundColor: currentTheme.accentLight, color: currentTheme.accent }}>
                                <i className="bi bi-eye"></i> View Reminders
                            </button>
                        </div>
                        {reminderMessage && <div className="text-xs mt-2 font-medium" style={{ color: currentTheme.accent }}>{reminderMessage}</div>}
                    </Card>
                    
                    {/* Card 4: Attendence Master */}
                    <Card icon="bi bi-person-badge" title="Attendence master">
                        <div className="grid grid-cols-3 gap-2 mb-3">
                            <button onClick={() => openInlinePanel('https://script.google.com/macros/s/AKfycbygiTRzoZQDNN_VANMsX00TI6ZEZrKeSLmahTvxpvZ2wAyEYfrxovJNyoDkiozS9snZ/exec', 'Attendance Dashboard')}
                                className="py-2 rounded-xl text-center transition-all hover:scale-105"
                                style={{ backgroundColor: currentTheme.accentLight }}>
                                <i className="bi bi-pie-chart-fill block mx-auto mb-1" style={{ color: currentTheme.accent }}></i>
                                <span className="text-xs font-medium" style={{ color: currentTheme.textPrimary }}>Dashboard</span>
                            </button>
                            <button onClick={() => openInlinePanel('https://script.google.com/macros/s/AKfycbyM89xYOYj3D_BvT52KFQnVN7d-U-8RcNuRQtcEVaEh1ne5KSojxVwo5GMBujWBiuEh/exec', 'Employee Management')}
                                className="py-2 rounded-xl text-center transition-all hover:scale-105"
                                style={{ backgroundColor: currentTheme.accentLight }}>
                                <i className="bi bi-person-plus-fill block mx-auto mb-1" style={{ color: currentTheme.accent }}></i>
                                <span className="text-xs font-medium" style={{ color: currentTheme.textPrimary }}>Add/Remove</span>
                            </button>
                            <button onClick={() => openInlinePanel('https://script.google.com/macros/s/AKfycbwY4BAapkeUOHfo4XFFO8vbg6BLG7AVF6MynOXHp_zrLGhytlhh4xdrnfBGozxiWGaD/exec', 'MIS Report Suite')}
                                className="py-2 rounded-xl text-center transition-all hover:scale-105"
                                style={{ backgroundColor: currentTheme.accentLight }}>
                                <i className="bi bi-graph-up block mx-auto mb-1" style={{ color: currentTheme.accent }}></i>
                                <span className="text-xs font-medium" style={{ color: currentTheme.textPrimary }}>MIS Report</span>
                            </button>
                        </div>
                        <div className="text-xs p-2 rounded-lg text-center" style={{ backgroundColor: currentTheme.accentLight, color: currentTheme.textSecondary }}>
                            <i className="bi bi-globe2"></i> HARIBANSHA Live Sync • {liveData.time}
                        </div>
                    </Card>
                    
                    {/* Card 5: HARIBANSHA IQ */}
                    <Card icon="bi bi-cpu" title="HARIBANSHA IQ">
                        <div className="flex flex-wrap gap-2 mb-3">
                            <button onClick={healthScan}
                                className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-semibold transition-all hover:scale-95"
                                style={{ backgroundColor: currentTheme.accentLight, color: currentTheme.accent }}>
                                <i className="bi bi-heart-pulse"></i> Health Scan
                            </button>
                            <button onClick={productivityPulse}
                                className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-semibold transition-all hover:scale-95"
                                style={{ backgroundColor: currentTheme.accentLight, color: currentTheme.accent }}>
                                <i className="bi bi-lightning-charge"></i> Productivity Pulse
                            </button>
                        </div>
                        <div className="text-xs p-2 rounded-lg text-center" style={{ backgroundColor: currentTheme.accentLight, color: currentTheme.textSecondary }}>
                            <span dangerouslySetInnerHTML={{ __html: iqResponse }} />
                        </div>
                    </Card>
                    
                    {/* Card 6: Live Data Hub */}
                    <Card icon="bi bi-bar-chart-steps" title="Live Data Hub">
                        <button onClick={refreshLiveData}
                            className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-semibold transition-all hover:scale-95 mb-3"
                            style={{ backgroundColor: currentTheme.accentLight, color: currentTheme.accent }}>
                            <i className="bi bi-arrow-repeat"></i> Refresh Stats
                        </button>
                        <div className="text-xs p-3 rounded-lg space-y-1" style={{ backgroundColor: currentTheme.accentLight }}>
                            <div className="flex justify-between"><span>👥 Active Staff:</span><span className="font-bold">{liveData.employees}</span></div>
                            <div className="flex justify-between"><span>📋 Tasks Today:</span><span className="font-bold">{liveData.tasks}</span></div>
                            <div className="flex justify-between"><span>✅ Completion:</span><span className="font-bold">{liveData.completion}%</span></div>
                            <div className="flex justify-between"><span>⚙️ Uptime:</span><span className="font-bold">99.98%</span></div>
                        </div>
                    </Card>
                </div>
                
                {/* Footer */}
                <footer className="text-center text-slate-400 text-xs pt-6 border-t border-slate-100 mt-4">
                    <i className="bi bi-charging-station"></i> HARIBANSHA React Dashboard • Real-time Intelligence
                </footer>
            </div>
        );
    };
    
    // Render React App
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    
    // Suppress React warnings from iframe
    const origConsoleError = console.error;
    console.error = function(...args) {
        if (typeof args[0] === 'string' && (args[0].includes('Invalid DOM property') || args[0].includes('stroke-width'))) return;
        origConsoleError.apply(console, args);
    };
</script>
</html>
